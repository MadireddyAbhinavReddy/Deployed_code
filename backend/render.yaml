services:
  - type: web
    name: clarity-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_DATASET_REPO
        value: AbhinavHuggingFaceAccount/cpcb-hyderabad
